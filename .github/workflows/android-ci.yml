name: AuraDrip App CI/CD

# Тригери для запуску пайплайну
on:
  push:
    branches:
      - lab4-android
    # Пайплайн запуститься лише при змінах у папці додатка
    paths:
      - 'Frontend/AuraDripApp/**'

  pull_request:
    branches:
      - lab4-android
    paths:
      - 'Frontend/AuraDripApp/**'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      #Чому не запустилось ?
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: Frontend/AuraDripApp

      - name: Install dependencies
        run: ./gradlew help
        working-directory: Frontend/AuraDripApp

      - name: Run linter
        run: ./gradlew lintDebug
        working-directory: Frontend/AuraDripApp

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest
        working-directory: Frontend/AuraDripApp

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: Frontend/AuraDripApp

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuraDripApp-Debug
          path: Frontend/AuraDripApp/app/build/outputs/apk/debug/app-debug.apk

      